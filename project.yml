name: DaedalusScan
options:
  bundleIdPrefix: com.martinbibb.daedalus
settings:
  base:
    SWIFT_VERSION: 5.10
targets:
  DaedalusScanCore:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaedalusScan
        excludes:
          - App
      - path: DaedalusContracts/Sources/DaedalusContracts
    settings:
      base:
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0.1
        CURRENT_PROJECT_VERSION: 20260624
        SUPPORTS_MACCATALYST: NO
  DaedalusScanApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaedalusScan/App
    dependencies:
      - target: DaedalusScanCore
    info:
      path: DaedalusScan/App/Info.plist
      properties:
        CFBundleDisplayName: Daedalus Capture
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: Daedalus Capture captures property twin evidence photos.
        NSPhotoLibraryUsageDescription: Daedalus Capture stores captured twin evidence.
        NSMicrophoneUsageDescription: Daedalus Capture records voice note evidence.
        LSSupportsOpeningDocumentsInPlace: false
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        CFBundleDocumentTypes:
          - CFBundleTypeName: Daedalus Capture Package
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.daedalus.scan.package
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.daedalus.scan.package
            UTTypeDescription: Daedalus Capture Package
            UTTypeConformsTo:
              - public.json
            UTTypeTagSpecification:
              public.filename-extension:
                - daedalusscan
              public.mime-type:
                - application/json
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 34Y4H49QMY
        PRODUCT_BUNDLE_IDENTIFIER: com.martinbibb.daedalus.scan
        PRODUCT_NAME: Daedalus Capture
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Daedalus Capture
        MARKETING_VERSION: 1.0.4
        CURRENT_PROJECT_VERSION: 2026062602
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
  DaedalusScanTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DaedalusScanTests
    dependencies:
      - target: DaedalusScanCore
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 34Y4H49QMY
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.martinbibb.daedalus.scan.tests
schemes:
  DaedalusScanApp:
    build:
      targets:
        DaedalusScanCore: all
        DaedalusScanApp: all
        DaedalusScanTests: [test]
    test:
      targets:
        - DaedalusScanTests
    run:
      config: Debug
